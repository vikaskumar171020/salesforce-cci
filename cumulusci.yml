minimum_cumulusci_version: "4.10.0"

project:
  name: AgentForceCRM
  package:
    name: AgentForceCRM
    namespace: Vikas_Student17
    api_version: "66.0"
  git:
    default_branch: "main"
  source_format: sfdx

orgs:
  scratch:
    dev:
      config_file: config/project-scratch-def.json
      days: 30

tasks:
  robot:
    options:
      suites: robot/AgentForceCRM/tests
      options:
        outputdir: robot/AgentForceCRM/results

  robot_testdoc:
    options:
      path: robot/AgentForceCRM/tests
      output: robot/AgentForceCRM/doc/AgentForceCRM_tests.html

  run_tests:
    options:
      required_org_code_coverage_percent: 85
      test_level: RunLocalTests

flows:
  dev_setup:
    description: "Create dev scratch org using config/project-scratch-def.json."
    steps: {}

  ci_feature_test:
    description: "CI flow for feature branches: builds feature org, deploys unmanaged source, and runs Apex tests."
    steps:
      1:
        flow: ci_feature
      2:
        task: run_tests

  full_ci:
    description: "Complete CI validation flow: builds scratch org, deploys metadata, runs Apex unit tests and Robot UI tests."
    steps:
      1:
        flow: ci_feature
      2:
        task: run_tests
      3:
        task: robot
