name: Create Scratch Org with CumulusCI

on:
  workflow_dispatch:
    inputs:
      adminEmail:
        description: "Admin Email for the scratch org"
        required: true
        type: string

jobs:
  create-scratch-org:
    name: Create Scratch Org with CumulusCI (CCI Dev)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      SF_TEMP_SHOW_SECRETS: "true"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Dependencies & Tools
        run: |
          npm ci || npm install
          npm install -g @salesforce/cli
          pip install cumulusci

      - name: Inject Admin Email into Scratch Org Definition
        if: ${{ inputs.adminEmail != '' }}
        run: |
          echo "Setting scratch org admin email to: ${{ inputs.adminEmail }}"
          jq --arg email "${{ inputs.adminEmail }}" '.adminEmail = $email' config/project-scratch-def.json > temp_def.json
          mv temp_def.json config/project-scratch-def.json
          cat config/project-scratch-def.json

      - name: Authenticate Dev Hub Org & Setup CCI Key
        env:
          DEVHUB_AUTH_URL: ${{ secrets.DEVHUB_AUTH_URL }}
          CUMULUSCI_KEY: "1234567890abcdef"
        run: |
          if [ -z "$DEVHUB_AUTH_URL" ]; then
            echo "::error::DEVHUB_AUTH_URL secret is not set."
            exit 1
          fi
          echo "$DEVHUB_AUTH_URL" > devhub_url.txt
          sf org login sfdx-url --sfdx-url-file devhub_url.txt --set-default-dev-hub --alias devhub
          rm -f devhub_url.txt
          cci service connect devhub --username devhub --project || true

      - name: Create Scratch Org, Run Dev Setup & Export Credentials
        env:
          CUMULUSCI_KEY: "1234567890abcdef"
        run: |
          # 1. Create scratch org and deploy org settings using CumulusCI
          cci flow run feature_org --org dev

          # 2. Extract scratch org username dynamically from created org
          SCRATCH_USERNAME=$(sf org display --target-org SalesforceCCIAutomation__dev --json 2>/dev/null | jq -r '.result.username // empty')
          if [ -z "$SCRATCH_USERNAME" ]; then
            SCRATCH_USERNAME=$(sf org display --target-org dev --json 2>/dev/null | jq -r '.result.username // empty')
          fi
          if [ -z "$SCRATCH_USERNAME" ]; then
            SCRATCH_USERNAME="SalesforceCCIAutomation__dev"
          fi

          # 3. Generate password for the user
          sf org generate password --target-org "$SCRATCH_USERNAME" --json >/dev/null 2>&1 || true

          # 4. Fetch org details, password, and SFDX Auth URL in JSON format
          DISPLAY_JSON=$(sf org display --target-org "$SCRATCH_USERNAME" --json 2>/dev/null || echo "{}")
          PASSWORD_JSON=$(sf org auth show-user-password --target-org "$SCRATCH_USERNAME" --json 2>/dev/null || echo "{}")
          AUTH_URL_JSON=$(sf org auth show-sfdx-auth-url --target-org "$SCRATCH_USERNAME" --json 2>/dev/null || echo "{}")

          # 5. Extract values using jq
          ALIAS=$(echo "$DISPLAY_JSON" | jq -r '.result.alias // "dev"')
          STATUS=$(echo "$DISPLAY_JSON" | jq -r '.result.status // "Active"')
          ORG_NAME=$(echo "$DISPLAY_JSON" | jq -r '.result.orgName // "Scratch Org"')
          ORG_ID=$(echo "$DISPLAY_JSON" | jq -r '.result.id // "N/A"')
          USERNAME=$(echo "$DISPLAY_JSON" | jq -r '.result.username // "'"$SCRATCH_USERNAME"'"')
          INSTANCE_URL=$(echo "$DISPLAY_JSON" | jq -r '.result.instanceUrl // "N/A"')
          API_VERSION=$(echo "$DISPLAY_JSON" | jq -r '.result.apiVersion // "63.0"')
          CREATED_DATE=$(echo "$DISPLAY_JSON" | jq -r '.result.createdDate // "N/A"')
          EXPIRATION_DATE=$(echo "$DISPLAY_JSON" | jq -r '.result.expirationDate // "N/A"')

          PASSWORD=$(echo "$PASSWORD_JSON" | jq -r '.result.password // "N/A"')
          if [ "$PASSWORD" = "null" ] || [ -z "$PASSWORD" ]; then
            PASSWORD="N/A"
          fi

          AUTH_URL=$(echo "$AUTH_URL_JSON" | jq -r '.result.sfdxAuthUrl // "N/A"')
          if [ "$AUTH_URL" = "null" ] || [ -z "$AUTH_URL" ]; then
            AUTH_URL="N/A"
          fi

          # 6. Format clean markdown without ANSI escape codes
          cat <<EOF > scratch_org_credentials.md
          # 🚀 Scratch Org Details & Credentials

          ## 📋 Org Information

          | Field | Value |
          | :--- | :--- |
          | **Alias** | \`$ALIAS\` |
          | **Status** | \`$STATUS\` |
          | **Org Name** | \`$ORG_NAME\` |
          | **Org ID** | \`$ORG_ID\` |
          | **Username** | \`$USERNAME\` |
          | **Password** | \`$PASSWORD\` |
          | **Instance URL** | \`$INSTANCE_URL\` |
          | **API Version** | \`$API_VERSION\` |
          | **Created Date** | \`$CREATED_DATE\` |
          | **Expire Date** | \`$EXPIRATION_DATE\` |

          ---

          ## 🔑 CLI Auth Token (SFDX Auth URL)

          \`\`\`text
          $AUTH_URL
          \`\`\`

          ---

          ## 🚀 How to Authenticate this Org in Salesforce CLI (\`sf\`)

          You can authenticate this scratch org on any machine using the \`force://\` SFDX Auth URL with the Salesforce CLI.

          ### Option 1: Authenticate using stdin (Quickest)

          Run the following command in your terminal:

          \`\`\`bash
          echo "$AUTH_URL" | sf org login sfdx-url --sfdx-url-stdin --alias $ALIAS --set-default
          \`\`\`

          ### Option 2: Authenticate using a File

          1. Save the auth URL string into a text file, e.g., \`authUrl.txt\`:
             \`\`\`bash
             echo "$AUTH_URL" > authUrl.txt
             \`\`\`

          2. Authorize the org using the file:
             \`\`\`bash
             sf org login sfdx-url --sfdx-url-file authUrl.txt --alias $ALIAS --set-default
             \`\`\`

          3. (Optional) Delete the \`authUrl.txt\` file after authenticating to keep sensitive credentials secure:
             \`\`\`bash
             rm authUrl.txt
             \`\`\`
          EOF

          # 7. Output to step logs & GitHub Job Summary
          cat scratch_org_credentials.md || true
          cat scratch_org_credentials.md >> $GITHUB_STEP_SUMMARY

      - name: Send Email with Scratch Org Credentials to Admin
        if: ${{ inputs.adminEmail != '' }}
        env:
          ADMIN_EMAIL: ${{ inputs.adminEmail }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: |
          echo "Preparing credentials notification for $ADMIN_EMAIL..."
          python3 - <<'EOF'
          import os, sys, smtplib
          from email.mime.text import MIMEText
          from email.mime.multipart import MIMEMultipart

          admin_email = os.environ.get("ADMIN_EMAIL")
          smtp_server = os.environ.get("SMTP_SERVER")
          smtp_port = os.environ.get("SMTP_PORT", "587")
          smtp_user = os.environ.get("SMTP_USERNAME")
          smtp_pass = os.environ.get("SMTP_PASSWORD")

          if not admin_email or not os.path.exists("scratch_org_credentials.md"):
              print("Skipping email: Missing admin email or credentials file.")
              sys.exit(0)

          with open("scratch_org_credentials.md", "r") as f:
              content = f.read()

          if smtp_server and smtp_user and smtp_pass:
              try:
                  msg = MIMEMultipart()
                  msg['From'] = smtp_user
                  msg['To'] = admin_email
                  msg['Subject'] = "🚀 Your Salesforce Scratch Org Credentials"
                  msg.attach(MIMEText(content, 'plain'))

                  server = smtplib.SMTP(smtp_server, int(smtp_port))
                  server.starttls()
                  server.login(smtp_user, smtp_pass)
                  server.send_message(msg)
                  server.quit()
                  print(f"Successfully sent credentials email to {admin_email}")
              except Exception as e:
                  print(f"Warning: Failed to send email via SMTP: {e}")
          else:
              print(f"SMTP secrets not set. Full credentials are rendered in GitHub Actions Job Summary for {admin_email}.")
          EOF

      - name: Commit & Push Credentials Markdown File to Branch
        if: always()
        run: |
          if [ -f scratch_org_credentials.md ] && [ -s scratch_org_credentials.md ]; then
            # Redact sensitive force:// auth URLs in the committed file to pass GitHub Push Protection
            sed -i -E 's/force:\/\/[^\s"`'\''<>]+/force:\/\/[REDACTED_FOR_SECURITY]/g' scratch_org_credentials.md

            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add scratch_org_credentials.md
            if git diff --staged --quiet; then
              echo "No credential changes to commit."
            else
              git commit -m "ci: save scratch org credentials markdown file [skip ci]"
              git push origin HEAD:${{ github.ref }}
            fi
          fi
