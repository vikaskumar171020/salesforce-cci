name: Create Scratch Org on Feature Branch

on:
  create:
  push:
    branches:
      - "feature/*"
      - "feature/**"
  workflow_dispatch:

jobs:
  create-scratch-org:
    name: Create Scratch Org with CumulusCI (CCI Dev)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Dependencies & Tools
        run: |
          npm ci || npm install
          npm install -g @salesforce/cli
          pip install cumulusci

      - name: Authenticate Dev Hub Org
        env:
          DEVHUB_AUTH_URL: ${{ secrets.DEVHUB_AUTH_URL }}
        run: |
          if [ -z "$DEVHUB_AUTH_URL" ]; then
            echo "::error::DEVHUB_AUTH_URL secret is not set."
            exit 1
          fi
          echo "$DEVHUB_AUTH_URL" > devhub_url.txt
          sf org login sfdx-url --sfdx-url-file devhub_url.txt --set-default-dev-hub --alias DevHub
          rm -f devhub_url.txt
          cci service connect devhub --username DevHub --project

      - name: Create Scratch Org & Run Dev Setup (CCI Dev)
        run: |
          cci org scratch dev dev
          cci flow run dev_setup --org dev

      - name: Generate Scratch Org Password & Export Credentials
        if: always()
        run: |
          # Generate password for the admin user in the scratch org
          sf org generate password --target-org dev || true

          # Write full org details (Username, Password, Org ID, Instance URL, Login URL) to txt file
          sf org display --target-org dev > scratch_org_credentials.txt || true

          # Display in step log
          cat scratch_org_credentials.txt || true

          # Output formatted credentials to GitHub Job Summary for instant view
          echo "### 🔑 Scratch Org Credentials & Login Info" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat scratch_org_credentials.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload Scratch Org Credentials Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scratch-org-credentials
          path: scratch_org_credentials.txt
