name: Create Scratch Org with CumulusCI

on:
  workflow_dispatch:
    inputs:
      adminEmail:
        description: 'Admin Email for the scratch org'
        required: true
        type: string

jobs:
  create-scratch-org:
    name: Create Scratch Org with CumulusCI (CCI Dev)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies & Tools
        run: |
          npm ci || npm install
          npm install -g @salesforce/cli
          pip install cumulusci

      - name: Inject Admin Email into Scratch Org Definition
        if: ${{ inputs.adminEmail != '' }}
        run: |
          echo "Setting scratch org admin email to: ${{ inputs.adminEmail }}"
          jq --arg email "${{ inputs.adminEmail }}" '.adminEmail = $email' config/project-scratch-def.json > temp_def.json
          mv temp_def.json config/project-scratch-def.json
          cat config/project-scratch-def.json

      - name: Authenticate Dev Hub Org & Setup CCI Key
        env:
          DEVHUB_AUTH_URL: ${{ secrets.DEVHUB_AUTH_URL }}
          CUMULUSCI_KEY: "1234567890abcdef"
        run: |
          if [ -z "$DEVHUB_AUTH_URL" ]; then
            echo "::error::DEVHUB_AUTH_URL secret is not set."
            exit 1
          fi
          echo "$DEVHUB_AUTH_URL" > devhub_url.txt
          sf org login sfdx-url --sfdx-url-file devhub_url.txt --set-default-dev-hub --alias devhub
          rm -f devhub_url.txt
          cci service connect devhub --username devhub --project || true

      - name: Create Scratch Org, Run Dev Setup & Export Credentials
        env:
          CUMULUSCI_KEY: "1234567890abcdef"
        run: |
          # 1. Create scratch org and deploy org settings
          cci flow run feature_org --org dev

          # 2. Initialize markdown file
          echo "# 🚀 Scratch Org Details & Credentials" > scratch_org_credentials.md
          echo "" >> scratch_org_credentials.md

          # 3. Extract scratch org username dynamically from created org
          SCRATCH_USERNAME=$(sf org display --target-org AgentForceCRM__dev --json 2>/dev/null | jq -r '.result.username // empty')
          if [ -z "$SCRATCH_USERNAME" ]; then
            SCRATCH_USERNAME=$(sf org display --target-org dev --json 2>/dev/null | jq -r '.result.username // empty')
          fi
          if [ -z "$SCRATCH_USERNAME" ]; then
            SCRATCH_USERNAME="AgentForceCRM__dev"
          fi

          # 4. Generate password using the extracted username
          echo "## 🔐 Password Generation Output" >> scratch_org_credentials.md
          echo '```text' >> scratch_org_credentials.md
          sf org generate password --target-org "$SCRATCH_USERNAME" >> scratch_org_credentials.md 2>&1 || true
          echo '```' >> scratch_org_credentials.md
          echo "" >> scratch_org_credentials.md

          # 5. Show User Password using sf org auth show-user-password
          echo "## 🔑 User Password (\`sf org auth show-user-password --target-org $SCRATCH_USERNAME\`)" >> scratch_org_credentials.md
          echo '```text' >> scratch_org_credentials.md
          sf org auth show-user-password --target-org "$SCRATCH_USERNAME" >> scratch_org_credentials.md 2>&1 || true
          echo '```' >> scratch_org_credentials.md
          echo "" >> scratch_org_credentials.md

          # 6. Retrieve org display credentials using the username (sf org display --target-org <username>)
          echo "## 🌐 Scratch Org Display Details (\`sf org display --target-org $SCRATCH_USERNAME\`)" >> scratch_org_credentials.md
          echo '```text' >> scratch_org_credentials.md
          sf org display --target-org "$SCRATCH_USERNAME" >> scratch_org_credentials.md 2>&1 || true
          echo '```' >> scratch_org_credentials.md

          # 7. Output to step logs & GitHub Job Summary
          cat scratch_org_credentials.md || true
          cat scratch_org_credentials.md >> $GITHUB_STEP_SUMMARY

      - name: Commit & Push Credentials Markdown File to Branch
        if: always()
        run: |
          if [ -f scratch_org_credentials.md ] && [ -s scratch_org_credentials.md ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add scratch_org_credentials.md
            if git diff --staged --quiet; then
              echo "No credential changes to commit."
            else
              git commit -m "ci: save scratch org credentials markdown [skip ci]"
              git push origin HEAD:${{ github.ref }}
            fi
          fi
